https<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melbourne Live Seal Flow</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 12px; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 260px; pointer-events: none;
        }
        h1 { margin: 0 0 5px; font-size: 18px; color: #005bb7; }
        #status { color: #666; font-weight: bold; font-size: 13px; margin-bottom: 10px; }
        .hint { font-size: 11px; color: #888; line-height: 1.2; }
    </style>
</head>
<body>
<div class="ui-panel">
    <h1>Melbourne Seal Flow 🦭</h1>
    <div id="status">Loading Map...</div>
    <div class="hint">
        Right-click + drag to tilt 3D.<br>
        Seals represent real people in the CBD right now.
    </div>
</div>
<div id="map"></div>

<script>
    const statusText = document.getElementById('status');

    // 1. Initialize Map
    const map = new maplibre-gl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: [144.9631, -37.8136],
        zoom: 14.5,
        pitch: 50,
        antialias: true
    });

    map.on('load', () => {
        statusText.innerText = "Fetching Melbourne Data...";
        
        // Create the Seal Icon from an Emoji
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = '100px serif'; ctx.textAlign = 'center';
        ctx.fillText('🦭', 64, 100);
        map.addImage('seal-img', ctx.getImageData(0, 0, 128, 128));

        // Add 3D Buildings for context
        map.addLayer({
            'id': '3d-buildings',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'type': 'fill-extrusion',
            'paint': {
                'fill-extrusion-color': '#ddd',
                'fill-extrusion-height': ['get', 'render_height'],
                'fill-extrusion-opacity': 0.6
            }
        });

        updateData();
    });

    async function updateData() {
        // We fetch 300 records to ensure we get a good sample of the CBD
        const COUNT_URL = 'https://data.melbourne.vic.gov.au/api/explore/v2.1/catalog/datasets/pedestrian-counting-system-past-hour-counts-per-minute/records?limit=100';
        const SENSOR_URL = 'https://data.melbourne.vic.gov.au/api/explore/v2.1/catalog/datasets/pedestrian-counting-system-sensor-locations/records?limit=100';

        try {
            const [countRes, sensorRes] = await Promise.all([fetch(COUNT_URL), fetch(SENSOR_URL)]);
            const countData = await countRes.json();
            const sensorData = await sensorRes.json();

            const features = countData.results.map(record => {
                const sensor = sensorData.results.find(s => s.location_id === record.location_id);
                if (!sensor) return null;
                
                const count = parseInt(record.total_of_directions) || 0;
                return {
                    'type': 'Feature',
                    'geometry': { 'type': 'Point', 'coordinates': [sensor.longitude, sensor.latitude] },
                    'properties': {
                        'name': sensor.sensor_description,
                        'count': count,
                        'size': Math.max(0.5, Math.min(count / 15, 5)) // Bigger count = bigger seal
                    }
                };
            }).filter(f => f !== null);

            const geojson = { 'type': 'FeatureCollection', 'features': features };

            if (map.getSource('seals')) {
                map.getSource('seals').setData(geojson);
            } else {
                map.addSource('seals', { 'type': 'geojson', 'data': geojson });
                map.addLayer({
                    'id': 'seal-layer',
                    'type': 'symbol',
                    'source': 'seals',
                    'layout': {
                        'icon-image': 'seal-img',
                        'icon-size': ['get', 'size'],
                        'icon-allow-overlap': true,
                        'icon-pitch-alignment': 'viewport'
                    }
                });
            }
            statusText.innerText = `Live: ${features.length} Seals Active 🦭`;
            statusText.style.color = "#28a745";
        } catch (err) {
            statusText.innerText = "Error: Data unavailable.";
            statusText.style.color = "#dc3545";
        }
    }

    // Update every minute
    setInterval(updateData, 60000);

    // Interactivity: Click a seal
    map.on('click', 'seal-layer', (e) => {
        const p = e.features[0].properties;
        new maplibre-gl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<strong>${p.name}</strong><br>Flow: ${p.count} people/min`)
            .addTo(map);
    });

    map.on('mouseenter', 'seal-layer', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'seal-layer', () => map.getCanvas().style.cursor = '');
</script>
</body>
</html>
